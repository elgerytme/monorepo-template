apiVersion: v1
kind: Namespace
metadata:
  name: example-app
  labels:
    name: example-app
    environment: development
    managed-by: kubernetes
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: example-app-quota
  namespace: example-app
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    persistentvolumeclaims: "10"
    services: "10"
    secrets: "10"
    configmaps: "10"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: example-app-limits
  namespace: example-app
spec:
  limits:
  - default:
      cpu: "500m"
      memory: "512Mi"
    defaultRequest:
      cpu: "100m"
      memory: "128Mi"
    type: Container