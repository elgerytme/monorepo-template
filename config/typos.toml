# Typos configuration for spell checking
# Typos is a fast Rust-based spell checker

[default]
# Check file names and identifiers
check-filenames = true
check-files = true

# Extend identifiers to include more contexts
identifier-leading-digits = false

[default.extend-words]
# Add project-specific terms that should not be flagged as typos
monorepo = "monorepo"
rustc = "rustc"
clippy = "clippy"
tokei = "tokei"
nextest = "nextest"
fastapi = "fastapi"
grpc = "grpc"
kubernetes = "kubernetes"
observability = "observability"
tracing = "tracing"

[files]
# File patterns to check
extend-glob = [
    "*.rs",
    "*.py", 
    "*.ts",
    "*.tsx",
    "*.js",
    "*.jsx",
    "*.go",
    "*.md",
    "*.yml",
    "*.yaml",
    "*.toml",
    "*.json",
]

# File patterns to ignore
ignore-glob = [
    "target/**",
    "node_modules/**",
    "dist/**",
    "build/**",
    ".git/**",
    "*.min.js",
    "*.min.css",
    "package-lock.json",
    "Cargo.lock",
    "go.sum",
]

[type.py]
# Python-specific spell checking
extend-glob = ["*.py", "*.pyi"]

[type.rs]
# Rust-specific spell checking  
extend-glob = ["*.rs"]

[type.ts]
# TypeScript-specific spell checking
extend-glob = ["*.ts", "*.tsx"]

[type.go]
# Go-specific spell checking
extend-glob = ["*.go"]

[type.md]
# Markdown-specific spell checking
extend-glob = ["*.md", "*.markdown"]