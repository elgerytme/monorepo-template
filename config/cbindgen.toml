# cbindgen configuration for generating C bindings from Rust code
# Enables cross-language integration between Rust and other languages

language = "C"

# Header configuration
header = """
/* Generated C bindings for Rust libraries */
/* This file is automatically generated - do not edit manually */

#pragma once

#ifdef __cplusplus
extern "C" {
#endif

#include <stdarg.h>
#include <stdbool.h>
#include <stdint.h>
#include <stdlib.h>
"""

trailer = """
#ifdef __cplusplus
}
#endif
"""

# Include guard
include_guard = "MONOREPO_RUST_BINDINGS_H"

# Namespace for C++ (if generating C++)
namespace = "monorepo"

# Style configuration
tab_width = 4
line_length = 100

# Documentation
documentation = true
documentation_style = "doxy"

# Type configuration
[enum]
rename_variants = "QualifiedScreamingSnakeCase"
must_use = true

[struct]
rename_fields = "snake_case"
derive_constructor = true
derive_eq = true
derive_neq = true

[fn]
rename_args = "snake_case"
must_use = true

# Export configuration
[export]
include = [
    "PublicStruct",
    "PublicEnum", 
    "public_function",
]

exclude = [
    "InternalStruct",
    "internal_function",
]

# Prefix for exported items
prefix = "monorepo_"

# Language-specific bindings
[export.rename]
"Result" = "MonorepoResult"
"Option" = "MonorepoOption"
"Vec" = "MonorepoVec"

# Memory management
[export.body]
"Vec<T>" = """
typedef struct {
    T *ptr;
    uintptr_t len;
    uintptr_t cap;
} MonorepoVec_{T};
"""

"Option<T>" = """
typedef struct {
    bool is_some;
    T value;
} MonorepoOption_{T};
"""

"Result<T, E>" = """
typedef struct {
    bool is_ok;
    union {
        T ok;
        E err;
    } value;
} MonorepoResult_{T}_{E};
"""