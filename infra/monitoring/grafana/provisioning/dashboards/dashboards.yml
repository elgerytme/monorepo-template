    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/security-compliance.json

  - name: 'developer-productivity'
    orgId: 1
    folder: 'Developer Productivity'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
