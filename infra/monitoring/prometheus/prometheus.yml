global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'monorepo-monitor'

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s

  # Node Exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor for container metrics
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s

  # Build metrics exporter
  - job_name: 'build-metrics'
    static_configs:
      - targets: ['build-metrics-exporter:8080']
    metrics_path: '/metrics'
    scrape_interval: 60s
    scrape_timeout: 30s

  # Security metrics exporter
  - job_name: 'security-metrics'
    static_configs:
      - targets: ['security-metrics-exporter:8080']
    metrics_path: '/metrics'
    scrape_interval: 300s
    scrape_timeout: 60s

  # Developer productivity metrics exporter
  - job_name: 'productivity-metrics'
    static_configs:
      - targets: ['productivity-metrics-exporter:8080']
    metrics_path: '/metrics'
    scrape_interval: 300s
    scrape_timeout: 60s

  # GitHub Actions metrics (if webhook configured)
  - job_name: 'github-actions'
    static_configs:
      - targets: ['localhost:8084']
    metrics_path: '/github/metrics'
    scrape_interval: 120s
    honor_labels: true

  # Buck2 build system metrics
  - job_name: 'buck2-metrics'
    static_configs:
      - targets: ['localhost:8085']
    metrics_path: '/buck2/metrics'
    scrape_interval: 60s

  # Custom application metrics
  - job_name: 'custom-apps'
    file_sd_configs:
      - files:
        - 'targets/*.json'
        refresh_interval: 60s
    relabel_configs:
      - source_labels: [__meta_filepath]
        target_label: service_discovery_file

# Remote write configuration (optional)
# remote_write:
#   - url: "https://prometheus-remote-write-endpoint"
#     basic_auth:
